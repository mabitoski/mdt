<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Configuration LDAP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="/env.js?v=20250108a"></script>
    <link rel="stylesheet" href="/styles.css?v=20250107a" />
  </head>
  <body>
    <div class="aura" aria-hidden="true"></div>
    <main class="app">
      <header class="admin-hero">
        <div class="admin-hero-copy">
          <p class="hero-kicker">MDT Secure</p>
          <h1>Configuration LDAP</h1>
          <p class="hero-sub">
            Gere l'authentification LDAP sans modifier les variables d'environnement.
          </p>
        </div>
        <div class="admin-hero-actions">
          <a class="admin-secondary" href="/">Retour au tableau</a>
          <a class="admin-secondary" href="/journal">Journal</a>
          <a class="logout-btn" href="/logout">Deconnexion</a>
        </div>
      </header>

      <section class="admin-panel">
        <div class="admin-card">
          <div class="admin-header">
            <div>
              <p class="admin-kicker">Administration</p>
              <h2>Connexion LDAP</h2>
              <p class="admin-sub">
                Configure l'authentification LDAP depuis l'interface web.
              </p>
            </div>
            <div class="admin-meta">
              <span class="admin-status" id="ldap-status" data-status="unknown">LDAP inconnu</span>
              <span class="admin-source" id="ldap-source"></span>
            </div>
          </div>
          <form class="admin-form" id="ldap-form">
            <div class="admin-grid">
              <label class="admin-field admin-toggle">
                <span>Activer LDAP</span>
                <input type="checkbox" id="ldap-enabled" />
              </label>
              <label class="admin-field">
                <span>LDAP URL</span>
                <input
                  type="text"
                  id="ldap-url"
                  placeholder="ldap://ad.local:389"
                  autocomplete="off"
                />
              </label>
              <label class="admin-field">
                <span>Base de recherche</span>
                <input
                  type="text"
                  id="ldap-search-base"
                  placeholder="dc=example,dc=local"
                  autocomplete="off"
                />
              </label>
              <label class="admin-field">
                <span>Bind DN (optionnel)</span>
                <input
                  type="text"
                  id="ldap-bind-dn"
                  placeholder="cn=bind,dc=example,dc=local"
                  autocomplete="off"
                />
              </label>
              <label class="admin-field">
                <span>Mot de passe bind</span>
                <input
                  type="password"
                  id="ldap-bind-password"
                  placeholder="Laisser vide pour conserver"
                  autocomplete="new-password"
                />
              </label>
              <label class="admin-check">
                <input type="checkbox" id="ldap-clear-password" />
                <span>Effacer le mot de passe enregistre</span>
              </label>
              <p class="admin-hint" id="ldap-password-hint"></p>
              <label class="admin-field">
                <span>Filtre de recherche</span>
                <input
                  type="text"
                  id="ldap-search-filter"
                  placeholder="(sAMAccountName={{username}})"
                  autocomplete="off"
                />
              </label>
              <label class="admin-field">
                <span>Attributs retournes</span>
                <input
                  type="text"
                  id="ldap-search-attributes"
                  placeholder="dn,cn,mail"
                  autocomplete="off"
                />
              </label>
              <label class="admin-check">
                <input type="checkbox" id="ldap-tls-reject" />
                <span>Verifier le certificat TLS</span>
              </label>
            </div>
            <div class="admin-actions">
              <button type="submit" class="admin-primary" id="ldap-save">Enregistrer</button>
              <button type="button" class="admin-secondary" id="ldap-reload">Recharger</button>
            </div>
            <div class="admin-feedback" id="ldap-feedback" role="status"></div>
            <p class="admin-note">Les changements prennent effet immediatement.</p>
          </form>
        </div>
      </section>
    </main>

    <script src="/admin.js" defer></script>
  </body>
</html>
