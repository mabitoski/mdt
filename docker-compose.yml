services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: mdt
      POSTGRES_USER: mdt
      POSTGRES_PASSWORD: mdt
    volumes:
      - mdt-db:/var/lib/postgresql/data
    restart: unless-stopped

  mdt-web:
    build: .
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DATABASE_URL: "postgres://mdt:mdt@postgres:5432/mdt"
      COOKIE_SECURE: "0"
      SESSION_SECRET: "change-me"
      ALLOW_LOCAL_ADMIN: "1"
      LOCAL_ADMIN_USER: "admin"
      LOCAL_ADMIN_PASSWORD: "admin"
      # LDAP_URL: "ldap://ldap.example.local"
      # LDAP_SEARCH_BASE: "dc=example,dc=local"
      # LDAP_BIND_DN: "cn=bind,dc=example,dc=local"
      # LDAP_BIND_PASSWORD: "secret"
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  mdt-db:
